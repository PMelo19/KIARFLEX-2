*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--charcoal);line-height:1.75}header{position:sticky;top:0;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:1.2rem 2rem;display:flex;align-items:center;justify-content:space-between;z-index:10}.brand{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;letter-spacing:.06em;color:var(--charcoal);text-decoration:none}.brand span{color:var(--brick)}nav{display:flex;gap:1rem;flex-wrap:wrap}nav a{color:var(--charcoal);text-decoration:none;font-weight:700;font-size:.9rem;padding:.55rem 1rem;border-radius:999px}nav a:hover{background:var(--sand)}.hero{background:linear-gradient(135deg,#48c9c2 0%,#8de4de 58%,#dff8f5 100%);padding:5rem 2rem;text-align:center}.hero .tag{display:inline-block;background:rgba(255,255,255,.85);padding:.35rem 1rem;border-radius:999px;text-transform:uppercase;letter-spacing:.12em;font-size:.78rem;font-weight:700;margin-bottom:1rem}.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.3rem,5vw,4rem);line-height:1.1}.wrap{max-width:980px;margin:0 auto;padding:3rem 1.5rem}.grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}.card{background:var(--white);border:1px solid var(--border);border-radius:28px;box-shadow:var(--soft-shadow);padding:2.2rem}.card h2{font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:1rem}.info{font-size:1.05rem;color:#294d4e}.info p{margin-bottom:.7rem}.info a{color:var(--brick);font-weight:700;text-decoration:none}.btn{display:inline-block;margin-top:1rem;background:var(--charcoal);color:white!important;text-decoration:none;padding:.85rem 1.4rem;border-radius:999px;font-weight:700}.map{min-height:320px;border-radius:28px;overflow:hidden;background:var(--sand);display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}.map a{color:var(--charcoal);font-weight:700}footer{background:#183536;color:var(--sand);padding:1.5rem 2rem;text-align:center;margin-top:2rem}@media(max-width:760px){header{align-items:flex-start;flex-direction:column;gap:.8rem}.grid{grid-template-columns:1fr}.hero{padding:3rem 1.5rem}.card{padding:1.5rem}}
